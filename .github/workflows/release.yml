name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., v0.2.0)'
        required: true
        default: 'v0.2.0'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target universal-apple-darwin'
            target: 'darwin'
            arch: 'universal'
          - platform: 'ubuntu-22.04'
            args: ''
            target: 'linux'
            arch: 'x86_64'
          - platform: 'windows-latest'
            args: ''
            target: 'windows'
            arch: 'x86_64'

    runs-on: ${{ matrix.platform }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libasound2-dev

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm install

      - name: Build the app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.event.inputs.version || github.ref_name }}
          releaseName: 'OpenClaw Local Installer ${{ github.event.inputs.version || github.ref_name }}'
          releaseBody: 'See CHANGELOG.md for details.'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

  notify:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Build Complete
        run: |
          echo "✅ 所有平台构建完成"
          echo "📦 请前往 Releases 页面下载安装包"
          echo "   - Windows: OpenClaw-Local-Installer_x64-setup.exe"
          echo "   - macOS: OpenClaw-Local-Installer_universal.dmg"
          echo "   - Linux: OpenClaw-Local-Installer_amd64.AppImage"

name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., v2.6.77)'
        required: true
        default: 'v2.6.77'

permissions:
  contents: write
  packages: write

env:
  DOCKERHUB_USERNAME: chenlong999988
  IMAGE_NAME: chenlong999988/openclaw

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target universal-apple-darwin'
          - platform: 'ubuntu-22.04'
            args: ''
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup npm registry
        run: |
          npm config set registry https://registry.npmjs.org/
          npm config delete registry
          npm config list

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm install

      - name: Build the app
        shell: bash
        run: |
          if [ "${{ matrix.platform }}" = "macos-latest" ]; then
            npm run tauri build -- --target universal-apple-darwin
          else
            npm run tauri build
          fi

      - name: Prepare artifacts (macOS)
        if: matrix.platform == 'macos-latest'
        shell: bash
        run: |
          mkdir -p release-artifacts
          if [ -d "src-tauri/target/universal-apple-darwin/release/bundle/macos" ]; then
            cp -r src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app release-artifacts/ 2>/dev/null || true
          fi
          if [ -d "src-tauri/target/universal-apple-darwin/release/bundle/dmg" ]; then
            cp src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg release-artifacts/ 2>/dev/null || true
          fi
          echo "Artifacts prepared:"
          ls -la release-artifacts/ || echo "No artifacts found"

      - name: Prepare artifacts (Windows)
        if: matrix.platform == 'windows-latest'
        shell: bash
        run: |
          mkdir -p release-artifacts
          if [ -d "src-tauri/target/release/bundle/msi" ]; then
            cp src-tauri/target/release/bundle/msi/*.msi release-artifacts/ 2>/dev/null || true
          fi
          if [ -d "src-tauri/target/release/bundle/nsis" ]; then
            cp src-tauri/target/release/bundle/nsis/*.exe release-artifacts/ 2>/dev/null || true
          fi
          echo "Artifacts prepared:"
          ls -la release-artifacts/ || echo "No artifacts found"

      - name: Prepare artifacts (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        shell: bash
        run: |
          mkdir -p release-artifacts
          if [ -d "src-tauri/target/release/bundle/appimage" ]; then
            cp src-tauri/target/release/bundle/appimage/*.AppImage release-artifacts/ 2>/dev/null || true
          fi
          if [ -d "src-tauri/target/release/bundle/deb" ]; then
            cp src-tauri/target/release/bundle/deb/*.deb release-artifacts/ 2>/dev/null || true
          fi
          if [ -d "src-tauri/target/release/bundle/rpm" ]; then
            cp src-tauri/target/release/bundle/rpm/*.rpm release-artifacts/ 2>/dev/null || true
          fi
          echo "Artifacts prepared:"
          ls -la release-artifacts/ || echo "No artifacts found"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}-bundle
          path: release-artifacts/*
          retention-days: 5
          if-no-files-found: warn

  # Docker 镜像构建（与桌面应用同版本号）
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine image tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.version }}" ]; then
            echo "TAG=${{ inputs.version }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref_type }}" = "tag" ]; then
            echo "TAG=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            echo "TAG=latest" >> $GITHUB_OUTPUT
          fi

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./docker
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.TAG }}
            ${{ env.IMAGE_NAME }}:latest
            ghcr.io/death1818/openclaw:${{ steps.tag.outputs.TAG }}
            ghcr.io/death1818/openclaw:latest
          platforms: linux/amd64,linux/arm64

  release:
    needs: [build, docker]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      
      - name: List artifacts for debugging
        run: |
          echo "Downloaded artifacts:"
          find artifacts -type f || echo "No files found"
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: 'OpenClaw Local Installer ${{ github.ref_name }}'
          body: |
            ## 下载安装器
            
            | 平台 | 文件 |
            |------|------|
            | Windows | `*.exe` 或 `*.msi` |
            | macOS | `*.dmg` |
            | Linux | `*.AppImage` 或 `*.deb` |
            
            ## Docker 镜像
            
            ```bash
            docker pull chenlong999988/openclaw:${{ github.ref_name }}
            ```
            
            运行命令：
            ```bash
            docker run -d --name openclaw \
              -p 18789:18789 \
              -v ~/.openclaw:/root/.openclaw \
              --add-host=host.docker.internal:host-gateway \
              chenlong999988/openclaw:${{ github.ref_name }}
            ```
            
            See CHANGELOG.md for details.
          draft: false
          prerelease: false
          files: artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
